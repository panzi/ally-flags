<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ally Flag Variations</title>
<link rel="stylesheet" href="style.css">
</head>
<body data-flags="ally-flag ally-flag-starfleet ally-flag-klingon ally-flag-stargate ally-flag-triforce ally-flag-arch">
<h1>Ally Flag Variations</h1>
<main>
<ul class="flags">
<li class="flag" id="flag-ally-flag">
    <figure>
        <img src="ally-flag.svg" onclick="openDialog(&quot;ally-flag&quot;)">
        <figcaption>
            <div class="downloads">
                <span class="downloads-label">Download:</span>
                <a class="download download-svg" download="ally-flag.svg" href="ally-flag.svg">SVG</a>
                <a class="download download-png" download="ally-flag.png" href="ally-flag.png">PNG</a>
            </div>
            <p>The <ns0:a xmlns:ns0="http://www.w3.org/2000/svg" id="a1" href="https://lgbtqia.fandom.com/wiki/Ally">LGBTQIA+ ally flag/straight ally</ns0:a> pride flag.</p>
        </figcaption>
    </figure>
</li>
<li class="flag" id="flag-ally-flag-starfleet">
    <figure>
        <img src="ally-flag-starfleet.svg" onclick="openDialog(&quot;ally-flag-starfleet&quot;)">
        <figcaption>
            <div class="downloads">
                <span class="downloads-label">Download:</span>
                <a class="download download-svg" download="ally-flag-starfleet.svg" href="ally-flag-starfleet.svg">SVG</a>
                <a class="download download-png" download="ally-flag-starfleet.png" href="ally-flag-starfleet.png">PNG</a>
            </div>
            <p>The insignia of Starfleet from the <ns0:a xmlns:ns0="http://www.w3.org/2000/svg" id="a2" href="https://www.startrek.com/">Star Trek</ns0:a> franchise.</p>
        </figcaption>
    </figure>
</li>
<li class="flag" id="flag-ally-flag-klingon">
    <figure>
        <img src="ally-flag-klingon.svg" onclick="openDialog(&quot;ally-flag-klingon&quot;)">
        <figcaption>
            <div class="downloads">
                <span class="downloads-label">Download:</span>
                <a class="download download-svg" download="ally-flag-klingon.svg" href="ally-flag-klingon.svg">SVG</a>
                <a class="download download-png" download="ally-flag-klingon.png" href="ally-flag-klingon.png">PNG</a>
            </div>
            <p>The insignia of the Klingon empire from the <ns0:a xmlns:ns0="http://www.w3.org/2000/svg" id="a3" href="https://www.startrek.com/">Star Trek</ns0:a> franchise.</p>
        </figcaption>
    </figure>
</li>
<li class="flag" id="flag-ally-flag-stargate">
    <figure>
        <img src="ally-flag-stargate.svg" onclick="openDialog(&quot;ally-flag-stargate&quot;)">
        <figcaption>
            <div class="downloads">
                <span class="downloads-label">Download:</span>
                <a class="download download-svg" download="ally-flag-stargate.svg" href="ally-flag-stargate.svg">SVG</a>
                <a class="download download-png" download="ally-flag-stargate.png" href="ally-flag-stargate.png">PNG</a>
            </div>
            <p>The symbol of earth on the stargate from the <ns0:a xmlns:ns0="http://www.w3.org/2000/svg" id="a4" href="https://mgm.com/franchise/stargate">Stargate</ns0:a> franchise.</p>
        </figcaption>
    </figure>
</li>
<li class="flag" id="flag-ally-flag-triforce">
    <figure>
        <img src="ally-flag-triforce.svg" onclick="openDialog(&quot;ally-flag-triforce&quot;)">
        <figcaption>
            <div class="downloads">
                <span class="downloads-label">Download:</span>
                <a class="download download-svg" download="ally-flag-triforce.svg" href="ally-flag-triforce.svg">SVG</a>
                <a class="download download-png" download="ally-flag-triforce.png" href="ally-flag-triforce.png">PNG</a>
            </div>
            <p>The triforce from <ns0:a xmlns:ns0="http://www.w3.org/2000/svg" id="a5" href="https://zelda.nintendo.com/">The Legend of Zelda</ns0:a> video game by Nintendo.</p>
        </figcaption>
    </figure>
</li>
<li class="flag" id="flag-ally-flag-arch">
    <figure>
        <img src="ally-flag-arch.svg" onclick="openDialog(&quot;ally-flag-arch&quot;)">
        <figcaption>
            <div class="downloads">
                <span class="downloads-label">Download:</span>
                <a class="download download-svg" download="ally-flag-arch.svg" href="ally-flag-arch.svg">SVG</a>
                <a class="download download-png" download="ally-flag-arch.png" href="ally-flag-arch.png">PNG</a>
            </div>
            <p>The logo of <ns0:a xmlns:ns0="http://www.w3.org/2000/svg" id="a6" href="https://archlinux.org/">Arch Linux</ns0:a>.</p>
        </figcaption>
    </figure>
</li>
</ul>
<dialog id="dialog">
    <img id="dialog-img">
    <button type="button" id="dialog-prev" class="dialog-nav dialog-prev" title="Previous"><span>‹</span></button>
    <button type="button" id="dialog-next" class="dialog-nav dialog-next" title="Next"><span>›</span></button>
    <button class="dialog-close" command="close" commandfor="dialog" title="Close">
        &times;
    </button>
</dialog>
